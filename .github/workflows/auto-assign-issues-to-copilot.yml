name: Auto-assign Issues to Copilot

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to assign to Copilot"
        required: true
        type: number

permissions:
  issues: write

jobs:
  assign-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        env:
          APP_ID: ${{ secrets.COPILOT_APP_ID }}
          APP_KEY: ${{ secrets.COPILOT_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$APP_ID" ] || [ -z "$APP_KEY" ]; then
            echo "::error::Missing required secrets: COPILOT_APP_ID and/or COPILOT_APP_PRIVATE_KEY"
            exit 1
          fi

      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.COPILOT_APP_ID }}
          private-key: ${{ secrets.COPILOT_APP_PRIVATE_KEY }}

      - name: Assign issue to Copilot via REST API
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || github.event.inputs.issue_number }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          body=$(jq -n \
            --arg repo "$REPO" \
            --arg branch "$BASE_BRANCH" \
            '{
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: $branch,
                custom_instructions: "",
                custom_agent: "",
                model: ""
              }
            }')

          gh api \
            -X POST \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
            --input - <<< "$body"
